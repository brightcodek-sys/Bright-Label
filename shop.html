<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bright Label Boutique</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">BRIGHT LABEL BOUTIQUE</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="#">New Arrivals</a>
        <a href="#">Collections</a>
        <a href="#">Best Sellers</a>
        <a href="admin.html">Admin</a>
    </nav>
    <div class="icons">
        🛒 (<span id="cart-count">0</span>)
    </div>
</header>

<main class="shop-page">
    <section class="section">
        <h1>Shop All</h1>
        <div class="filters">
            <button class="btn btn-small active">All</button>
            <button class="btn btn-small">Clothing</button>
            <button class="btn btn-small">Accessories</button>
            <button class="btn btn-small">Shoes</button>
            <button class="btn btn-small">Perfume</button>
            <button class="btn btn-small">Bags</button>
            <button class="btn btn-small">Sale</button>
        </div>
        <div class="grid" id="product-grid">
            <!-- product cards will be injected here via JavaScript -->
        </div>
    </section>
</main>

<footer>
    <div class="newsletter">
        <h3>Join the Inner Circle</h3>
        <p>Get 15% off your first order.</p>
        <div class="input-group">
            <input type="email" placeholder="yourname@email.com">
            <button class="btn btn-small">Join</button>
        </div>
    </div>
    <p class="copyright">&copy; 2026 Bright Label Boutique. Style with a Spark.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
