<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Bright Label Boutique</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">BRIGHT LABEL BOUTIQUE</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="admin.html">Admin</a>
    </nav>
    <div class="icons">
        🛒 (<span id="cart-count">0</span>)
    </div>
</header>

<main class="shop-page">
    <section class="section">
        <h1>Product Administration</h1>
        <form id="admin-form" class="admin-form">
            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" required>

            <label for="category">Category</label>
            <select id="category" required>
                <option value="clothing">Clothing</option>
                <option value="accessories">Accessories</option>
            </select>

            <label>
                <input type="checkbox" id="sale">
                On Sale
            </label>

            <label>
                <input type="checkbox" id="trending">
                Trending
            </label>

            <label for="image">Image URL</label>
            <input type="url" id="image" required>

            <button class="btn" type="submit">Add Product</button>
        </form>

        <div id="admin-feedback"></div>
        <div id="admin-list">
            <h3>Added Products</h3>
            <!-- list populated by JavaScript -->
        </div>
    </section>
</main>

<footer>
    <div class="newsletter">
        <h3>Join the Inner Circle</h3>
        <p>Get 15% off your first order.</p>
        <div class="input-group">
            <input type="email" placeholder="yourname@email.com">
            <button class="btn btn-small">Join</button>
        </div>
    </div>
    <p class="copyright">&copy; 2026 Bright Label Boutique. Style with a Spark.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
